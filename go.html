<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Opening...</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* SSL badge */
    #ssl-bar {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 44px;
      line-height: 44px;
      background: rgba(7,193,96,0.07);
      color: #07c160;
      font-size: 13px;
      text-align: center;
      z-index: 99;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 36px 28px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }

    /* Spinner */
    .spinner {
      width: 56px;
      height: 56px;
      border: 4px solid #e8e8e8;
      border-top-color: #07c160;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #status-text {
      font-size: 16px;
      color: #555;
      margin-bottom: 8px;
    }
    #sub-text { font-size: 13px; color: #aaa; margin-bottom: 28px; }

    /* Open button */
    #open-btn {
      display: none;
      width: 100%;
      padding: 14px;
      background: #07c160;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 20px;
    }
    #open-btn:hover { background: #06ad56; }

    /* QR section (desktop fallback) */
    #qr-section { display: none; margin-top: 24px; }
    #qr-section p { font-size: 13px; color: #888; margin-bottom: 12px; }
    #qr-canvas { border-radius: 10px; border: 1px solid #eee; }

    .divider {
      border: none;
      border-top: 1px solid #f0f0f0;
      margin: 24px 0;
    }
    .url-preview {
      font-size: 12px;
      color: #bbb;
      word-break: break-all;
    }
  </style>
</head>
<body>

<div id="ssl-bar">✅ This page is SSL encrypted</div>

<div class="card">
  <div id="loading-view">
    <div class="spinner"></div>
    <div id="status-text">Opening...</div>
    <div id="sub-text">Redirecting to the destination</div>
  </div>

  <a id="open-btn">Open Link</a>

  <div id="qr-section">
    <p>Scan with your phone to open in WeChat / app</p>
    <canvas id="qr-canvas"></canvas>
  </div>

  <hr class="divider" />
  <div class="url-preview" id="url-preview"></div>
</div>

<script>
  function getParam(name) {
    return new URLSearchParams(window.location.search).get(name) || '';
  }

  var targetUrl = getParam('url');
  var isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
  var isWeixin = /MicroMessenger/i.test(navigator.userAgent);

  // Show the destination URL
  if (targetUrl) {
    document.getElementById('url-preview').textContent = targetUrl;
  } else {
    document.getElementById('status-text').textContent = 'No link provided';
    document.getElementById('sub-text').textContent = '';
  }

  function showOpenButton() {
    var btn = document.getElementById('open-btn');
    btn.style.display = 'block';
    btn.href = targetUrl;
    btn.textContent = 'Open Link';
    document.getElementById('status-text').textContent = 'Ready to open';
    document.getElementById('sub-text').textContent = 'Tap the button below';
    document.querySelector('.spinner').style.display = 'none';
  }

  function showQR() {
    var section = document.getElementById('qr-section');
    section.style.display = 'block';
    QRCode.toCanvas(document.getElementById('qr-canvas'), targetUrl, {
      width: 200,
      margin: 2,
      color: { dark: '#000000', light: '#ffffff' }
    });
    document.getElementById('status-text').textContent = 'Scan on your phone';
    document.getElementById('sub-text').textContent = 'Use WeChat or camera to scan';
    document.querySelector('.spinner').style.display = 'none';
  }

  function tryOpen() {
    if (!targetUrl) return;

    if (isMobile) {
      // On mobile — attempt direct redirect
      document.getElementById('status-text').textContent = 'Opening...';

      // Try direct redirect
      window.location.href = targetUrl;

      // Fallback: if still here after 2s, show button
      setTimeout(function() {
        if (!document.hidden) {
          showOpenButton();
        }
      }, 2000);

    } else {
      // On desktop — show QR to scan on phone
      document.getElementById('status-text').textContent = 'Open on your phone';
      document.getElementById('sub-text').textContent = 'Scan the QR code below with WeChat or your camera';
      document.querySelector('.spinner').style.display = 'none';
      showQR();
      // Also show open button for desktop browsers
      showOpenButton();
    }
  }

  if (targetUrl) {
    // Small delay so the animation shows
    setTimeout(tryOpen, 600);
  }
</script>
</body>
</html>
