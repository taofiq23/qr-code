<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=0,viewport-fit=cover">
    <title>l-...</title>
    <style>
        body{
            background-repeat:no-repeat;
            background-position: left top;
            background-color: #efeff4;
            background-size: 100%;
            padding: 0;
            margin: 0;
        }
    </style>
</head>
<body>
<script>
(function () {
    // ===== SSL bar — exact original =====
    var tips = document.createElement('div');
    tips.innerText = '✅ 本页面已经过SSL安全加密';
    tips.style.cssText =
        'position:fixed;top:0;left:0;width:100%;height:45px;line-height:45px;' +
        'background:rgba(7,193,96,0.05);color:#07c160;font-size:13px;text-align:center;z-index:9999;';
    document.body.appendChild(tips);

    // ===== UI — exact original =====
    var div = document.createElement('div');
    div.style.cssText =
        'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);' +
        'text-align:center;width:100%;z-index:9998;';

    var img = document.createElement('img');
    img.src = 'https://p4.ssl.qhimg.com/t11b673bcd67c7f3b837622a705.gif';
    img.style.cssText = 'width:70%;max-width:500px;display:block;margin:0 auto 10px;';

    var text = document.createElement('div');
    text.innerHTML = '<span style="color:#999;font-size:15px;">跳转中...</span>';

    var link = document.createElement('a');
    link.innerText = '点击跳转';
    link.href = 'javascript:void(0)';
    link.style.cssText =
        'display:none;margin-top:15px;padding:12px 40px;font-size:16px;' +
        'border-radius:20px;background:#07c160;color:#fff;text-decoration:none;' +
        'cursor:pointer;';

    div.appendChild(img);
    div.appendChild(text);
    div.appendChild(link);
    document.body.appendChild(div);

    // ===== Skip API — use QR.jpg directly (alicdn-style behavior) =====
    var jumpUrl = 'https://work.weixin.qq.com/u/vc71eafeff743a6978?v=5.0.0.198637&bb=c8fad8ae45';

    document.title = '截图扫码';

    // Replace loading gif with QR.jpg — same as original alicdn special case
    img.src = 'QR.jpg';
    img.style.maxWidth = '90%';
    img.style.borderRadius = '8px';

    text.innerText = '';

    // Show jump button linking to WeChat Work contact
    link.href = jumpUrl;
    link.style.display = 'inline-block';

})();
</script>
</body>
</html>
