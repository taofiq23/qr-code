<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
  <meta name="format-detection" content="telephone=no, email=no">
  <title>跳转中</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #efeff4; }

    #ssl-bar {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 45px;
      line-height: 45px;
      background: rgba(7,193,96,0.05);
      color: #07c160;
      font-size: 13px;
      text-align: center;
      z-index: 9999;
    }

    #main {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      width: 100%;
    }

    /* Icon row — Taobao dots WeChat */
    .icon-row {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }

    .app-icon {
      width: 80px;
      height: 80px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Taobao icon */
    .taobao {
      background: linear-gradient(145deg, #ff6600, #ff4400);
      font-size: 42px;
      color: white;
      font-weight: bold;
      font-family: serif;
    }

    /* WeChat icon */
    .wechat {
      background: #2DC100;
    }
    .wechat svg {
      width: 52px;
      height: 52px;
    }

    /* Animated dots between icons */
    .dots {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 0 14px;
    }
    .dots span {
      width: 8px;
      height: 8px;
      background: #ccc;
      border-radius: 50%;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dots span:nth-child(1) { animation-delay: 0s; }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    .dots span:nth-child(4) { animation-delay: 0.6s; }
    .dots span:nth-child(5) { animation-delay: 0.8s; }

    @keyframes pulse {
      0%, 100% { background: #ccc; transform: scale(1); }
      50% { background: #07c160; transform: scale(1.3); }
    }

    #status {
      color: #999;
      font-size: 15px;
      margin-bottom: 20px;
    }

    #open-btn {
      display: inline-block;
      padding: 13px 44px;
      font-size: 16px;
      border-radius: 24px;
      background: #07c160;
      color: #fff;
      text-decoration: none;
      cursor: pointer;
    }

    /* QR section — shown after redirect attempt */
    #qr-section {
      display: none;
      margin-top: 32px;
    }
    #qr-section img {
      width: 75%;
      max-width: 340px;
      border-radius: 12px;
    }
    #qr-section p {
      color: #aaa;
      font-size: 13px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div id="ssl-bar">✅ 本页面已经过SSL安全加密</div>

<div id="main">
  <!-- Icon animation row -->
  <div class="icon-row">
    <div class="app-icon taobao">淘</div>
    <div class="dots">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="app-icon wechat">
      <!-- WeChat logo SVG -->
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="17" cy="22" rx="13" ry="10" fill="white" opacity="0.95"/>
        <ellipse cx="31" cy="27" rx="11" ry="8.5" fill="white" opacity="0.7"/>
        <circle cx="13" cy="22" r="2" fill="#2DC100"/>
        <circle cx="21" cy="22" r="2" fill="#2DC100"/>
        <circle cx="27.5" cy="27" r="1.7" fill="#2DC100"/>
        <circle cx="34.5" cy="27" r="1.7" fill="#2DC100"/>
      </svg>
    </div>
  </div>

  <div id="status">跳转中...</div>
  <a id="open-btn" href="https://work.weixin.qq.com/u/vc71eafeff743a6978?v=5.0.0.198637&bb=c8fad8ae45">点击跳转</a>

  <!-- QR fallback shown after redirect -->
  <div id="qr-section">
    <img src="QR.jpg" />
    <p>长按识别二维码</p>
  </div>
</div>

<script>
  var jumpUrl = 'https://work.weixin.qq.com/u/vc71eafeff743a6978?v=5.0.0.198637&bb=c8fad8ae45';

  // Auto redirect after 1.5s — same timing as original
  setTimeout(function() {
    window.location.href = jumpUrl;
  }, 1500);

  // Show QR after 4s for those who stay on page
  setTimeout(function() {
    document.getElementById('qr-section').style.display = 'block';
    document.getElementById('status').innerText = '截图扫码';
  }, 4000);
</script>

</body>
</html>
