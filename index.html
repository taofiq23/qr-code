<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
  <meta name="format-detection" content="telephone=no, email=no">
  <title>截图扫码</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #efeff4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Top SSL bar — exact same as original */
    #ssl-bar {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 45px;
      line-height: 45px;
      background: rgba(7,193,96,0.05);
      color: #07c160;
      font-size: 13px;
      text-align: center;
      z-index: 9999;
    }

    /* Center container */
    #main {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      width: 100%;
      z-index: 9998;
    }

    /* QR image — same style as original */
    #qr-img {
      width: 70%;
      max-width: 500px;
      display: block;
      margin: 0 auto 10px;
      border-radius: 8px;
    }

    /* Loading gif shown before QR */
    #loading-gif {
      width: 70%;
      max-width: 500px;
      display: block;
      margin: 0 auto 10px;
    }

    #label {
      color: #999;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <div id="ssl-bar">✅ 本页面已经过SSL安全加密</div>

  <div id="main">
    <!-- Loading gif shown first, then replaced by QR -->
    <img id="loading-gif" src="https://p4.ssl.qhimg.com/t11b673bcd67c7f3b837622a705.gif" />
    <img id="qr-img" src="QR.jpg" style="display:none;" />
    <div id="label"><span style="color:#999;font-size:15px;">截图扫码</span></div>
  </div>

  <script>
    // Show loading for 1 second, then reveal QR — same behavior as original
    setTimeout(function() {
      document.getElementById('loading-gif').style.display = 'none';
      document.getElementById('qr-img').style.display = 'block';
    }, 1000);
  </script>

</body>
</html>
