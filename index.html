<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
  <meta name="format-detection" content="telephone=no, email=no">
  <title>截图扫码</title>
  <style>
    body {
      background-color: #efeff4;
      padding: 0;
      margin: 0;
    }
    #ssl-bar {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 45px;
      line-height: 45px;
      background: rgba(7,193,96,0.05);
      color: #07c160;
      font-size: 13px;
      text-align: center;
      z-index: 9999;
    }
    #main {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      width: 100%;
      z-index: 9998;
    }
    #qr-img {
      width: 80%;
      max-width: 500px;
      display: block;
      margin: 0 auto 16px;
      border-radius: 12px;
    }
    #open-btn {
      display: inline-block;
      margin-top: 10px;
      padding: 12px 40px;
      font-size: 16px;
      border-radius: 20px;
      background: #07c160;
      color: #fff;
      text-decoration: none;
      cursor: pointer;
      border: none;
    }
    #label {
      color: #999;
      font-size: 15px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

<div id="ssl-bar">✅ 本页面已经过SSL安全加密</div>

<div id="main">
  <img id="qr-img" src="QR.jpg" />
  <div id="label">截图扫码</div>
  <a id="open-btn" href="weixin://dl/business/?t=qsPCgLx3eks">点击跳转</a>
</div>

<script>
  // Auto open WeChat on page load
  setTimeout(function() {
    window.location.href = 'weixin://dl/business/?t=qsPCgLx3eks';
  }, 500);
</script>

</body>
</html>
