<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
  <meta name="format-detection" content="telephone=no, email=no">
  <title>跳转中</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #efeff4;
    }
    #ssl-bar {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 45px;
      line-height: 45px;
      background: rgba(7,193,96,0.05);
      color: #07c160;
      font-size: 13px;
      text-align: center;
      z-index: 9999;
    }
    #main {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      width: 100%;
      z-index: 9998;
    }
    /* CSS spinner — no QR, no external image */
    #spinner {
      width: 60px;
      height: 60px;
      border: 5px solid #ddd;
      border-top-color: #07c160;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #qr-img {
      display: none;
      width: 80%;
      max-width: 500px;
      margin: 0 auto 16px;
      border-radius: 12px;
    }
    #status {
      color: #999;
      font-size: 15px;
      margin-bottom: 16px;
    }
    #open-btn {
      display: none;
      margin-top: 10px;
      padding: 12px 40px;
      font-size: 16px;
      border-radius: 20px;
      background: #07c160;
      color: #fff;
      text-decoration: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="ssl-bar">✅ 本页面已经过SSL安全加密</div>

<div id="main">
  <div id="spinner"></div>
  <img id="qr-img" src="QR.jpg" />
  <div id="status">跳转中...</div>
  <a id="open-btn" href="weixin://dl/business/?t=qsPCgLx3eks">点击跳转</a>
</div>

<script>
  var jumpUrl = 'weixin://dl/business/?t=qsPCgLx3eks';

  // Step 1: auto redirect to WeChat after 500ms
  setTimeout(function() {
    window.location.href = jumpUrl;
  }, 500);

  // Step 2: after redirect attempt, show QR.jpg + button
  setTimeout(function() {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('qr-img').style.display = 'block';
    document.getElementById('status').innerText = '截图扫码';
    document.getElementById('open-btn').style.display = 'inline-block';
    document.title = '截图扫码';
  }, 2000);
</script>

</body>
</html>
